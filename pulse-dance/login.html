<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Pulse Dance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        :root {
            --primary: #7A4B9C;
            --primary-light: #B58DCD;
            --primary-pastel: #E8D5F5;
            --primary-bg: #F8F0FC;
            --white: #FFFFFF;
            --gold: #D4AF37;
            --text-dark: #2D1B3D;
            --text-muted: #6B5B7A;
            --shadow: 0 8px 30px rgba(74, 44, 104, 0.12);
            --radius: 16px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 420px;
            width: 100%;
        }

        .login-container .logo {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .login-container .logo i {
            color: var(--gold);
        }

        .login-container h2 {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 1.6rem;
        }

        .login-container .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-weight: 500;
            display: block;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--primary-pastel);
            border-radius: 40px;
            font-size: 1rem;
            background: var(--primary-bg);
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-login:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(122, 75, 156, 0.3);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><i class="fas fa-music"></i> Pulse</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your account</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your username" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <p class="login-footer">Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <script>
        // ================================================================
        // LOGIN HANDLER – works with student or admin
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');

            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();

                    const username = document.getElementById('loginUsername').value.trim();
                    const password = document.getElementById('loginPassword').value.trim();

                    if (!username) {
                        alert('Please enter a username.');
                        return;
                    }

                    if (!password) {
                        alert('Please enter your password.');
                        return;
                    }

                    // Save user to session
                    sessionStorage.setItem('pulseUser', username);

                    // Save cart (if any)
                    if (!sessionStorage.getItem('pulseCart')) {
                        sessionStorage.setItem('pulseCart', JSON.stringify([]));
                    }

                    // Redirect based on role
                    if (username.toLowerCase() === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
